<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ReBank - Premium Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2edc6b",
                        "background-light": "#f6f8f7",
                        "background-dark": "#122017",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <div
        class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
        <!-- Header -->
        <nav class="relative z-10 flex items-center justify-between p-6 md:px-12">
            <div class="flex items-center gap-2 group">
                <div class="bg-primary/10 p-2 rounded-lg text-primary">
                    <span class="material-symbols-outlined">
                        forest
                    </span>
                </div>
                <span class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">
                    Re<span class="text-primary">Bank</span>
                </span>
            </div>
            <div class="hidden md:flex gap-8 items-center text-sm font-semibold text-slate-600 dark:text-slate-400">
                <a class="hover:text-primary transition-colors" href="#">Premium</a>
                <a class="hover:text-primary transition-colors" href="#">Sustainability</a>
                <a class="hover:text-primary transition-colors" href="#">Help</a>
            </div>
        </nav>
        <div class="flex-1 flex flex-col items-center justify-center px-4 pt-4 pb-8">
            <div class="w-full max-w-[440px] space-y-8">
                <!-- Hero Image Area -->
                <div class="@container">
                    <div class="@[480px]:px-0">
                        <div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/10 rounded-xl min-h-[180px] border border-primary/20 relative"
                            data-alt="Abstract digital network connections with emerald green light"
                            style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA5WJ-OQ331yPG47b0LhDmCA17SoQAhXaixry5qKenfs2b4f8Eh5vI4JNuLZc7SQuFhX_0FPzzRUaaTMSrs6i1dElNpdOVHixsQcAQpcirhv4rGLvQQkQZzlMiltk3_ZedOFJtpkbc9mAWOrlf_go1QpmgWeYQLAnuorFbBEI30ZNAu1wfFukNwt2hNGH71cgoWB2twr9Ys9M3c34Bds9O0UL2_xawGrlzvMqi0l620-h1HgH1bTuee1-9-ngGXMhyh1NfuMHG8Zkk");'>
                            <div
                                class="absolute inset-0 bg-gradient-to-t from-background-dark to-transparent opacity-60">
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Welcome Text -->
                <div class="text-center">
                    <h1 class="text-slate-900 dark:text-white tracking-tight text-[32px] font-bold leading-tight mb-2">
                        Welcome back</h1>
                    <p class="text-slate-600 dark:text-primary/70 text-base font-normal leading-normal">Securely access
                        your premium account</p>
                </div>
                <!-- Login Form -->
                <div class="space-y-4">
                    <!-- Email Field -->
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-900 dark:text-slate-200 text-sm font-medium leading-none">Email or
                            Username</label>
                        <div class="relative">
                            <input
                                class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 h-14 placeholder:text-slate-400 dark:placeholder:text-primary/30 p-4 text-base font-normal"
                                placeholder="Enter your email" type="text" />
                            <span
                                class="material-symbols-outlined absolute right-4 top-4 text-slate-400 dark:text-primary/40">mail</span>
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <label
                                class="text-slate-900 dark:text-slate-200 text-sm font-medium leading-none">Password</label>
                            <a class="text-primary text-xs font-semibold hover:underline" href="#">Forgot Password?</a>
                        </div>
                        <div class="relative">
                            <input
                                class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 h-14 placeholder:text-slate-400 dark:placeholder:text-primary/30 p-4 text-base font-normal"
                                placeholder="••••••••" type="password" />
                            <span
                                class="material-symbols-outlined absolute right-4 top-4 text-slate-400 dark:text-primary/40 cursor-pointer">visibility_off</span>
                        </div>
                    </div>
                    <!-- Biometric Login Button -->
                    <button
                        class="w-full flex items-center justify-center gap-3 py-3 rounded-xl border border-primary/20 bg-primary/5 text-primary hover:bg-primary/10 transition-colors">
                        <span class="material-symbols-outlined">fingerprint</span>
                        <span class="text-sm font-semibold">Login with Biometrics</span>
                    </button>
                    <!-- Main Login Button -->
                    <div class="pt-4">
                        <button
                            class="w-full bg-primary text-background-dark font-bold text-lg h-14 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            Log In
                            <span class="material-symbols-outlined">arrow_forward</span>
                        </button>
                    </div>
                </div>
                <!-- Footer -->
                <div class="text-center space-y-4">
                    <p class="text-slate-500 dark:text-primary/40 text-sm">
                        Don't have an account? <a class="text-primary font-bold hover:underline" href="#">Apply Now</a>
                    </p>
                    <div class="flex justify-center gap-6 pt-4">
                        <span class="material-symbols-outlined text-slate-400 dark:text-primary/30">verified_user</span>
                        <span class="material-symbols-outlined text-slate-400 dark:text-primary/30">lock</span>
                        <span class="material-symbols-outlined text-slate-400 dark:text-primary/30">shield</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- System Status Bar (Mobile-style aesthetic) -->
        <div class="p-6 text-center">
            <p class="text-[10px] uppercase tracking-widest text-slate-400 dark:text-primary/30 font-bold">Encrypted
                End-to-End Connection</p>
        </div>
    </div>
</body>

</html>
